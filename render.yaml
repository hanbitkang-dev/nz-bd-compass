services:
  - type: web
    name: nz-bd-compass
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://pharmac-tracker.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
